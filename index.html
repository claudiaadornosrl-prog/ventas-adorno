<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ventas · Claudia Adorno</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#dc2626">
<link rel="icon" href="favicon.svg" type="image/svg+xml">

<style>
:root {
  --primary: #dc2626;     /* Rojo Ventas */
  --primary-dark: #991b1b;
  --bg: #f9fafb;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --orange: #f59e0b;
  --orange-bg: #fef3c7;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

.screen { display: none; }
.screen.active { display: block; }

/* ═══ LOGIN ═══ */
/* Solo aplica cuando tiene .active — sino prevalece la regla .screen { display:none } */
#login-screen.active { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); }
.login-card { background: white; border-radius: 16px; padding: 30px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 380px; width: 100%; }
.login-card h1 { text-align: center; font-size: 26px; margin: 0 0 4px; color: var(--primary); }
.login-card .sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 22px; }
.login-card label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.login-card input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; margin-bottom: 14px; }
.login-card input:focus { outline: none; border-color: var(--primary); }
.local-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.local-opt { border: 2px solid var(--border); border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.15s; background: white; }
.local-opt:hover { border-color: #aaa; }
.local-opt.selected { border-color: var(--primary); background: var(--primary); color: white; }
.local-opt .icon { font-size: 22px; margin-bottom: 4px; }
.local-opt .name { font-size: 12px; font-weight: 700; }
.btn-primary { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { color: var(--primary); font-size: 12px; margin-bottom: 8px; min-height: 16px; }
.admin-link { text-align: center; margin-top: 14px; font-size: 12px; }
.admin-link a { color: var(--muted); text-decoration: underline; cursor: pointer; }

/* ═══ APP ═══ */
.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-title { font-size: 17px; font-weight: 700; color: var(--primary); }
.header-local { font-size: 12px; color: var(--muted); }
.header-right { display: flex; gap: 8px; align-items: center; }
.btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.btn-secondary:hover { background: #f3f4f6; }
.btn-icon { background: white; border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }

.toolbar { background: white; border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.toolbar select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: white; cursor: pointer; }
.toolbar button { padding: 7px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; background: white; }
.toolbar button.primary { background: var(--primary); color: white; border-color: var(--primary); }
.toolbar button.primary:hover { background: var(--primary-dark); }
.toolbar .spacer { flex: 1; }

/* KPIs */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 16px; }
.kpi { background: white; border-radius: 10px; padding: 14px; box-shadow: var(--shadow); }
.kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.kpi-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Tabla */
.table-wrap { background: white; margin: 0 16px 16px; border-radius: 10px; box-shadow: var(--shadow); overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
th { background: #f9fafb; padding: 10px 8px; text-align: right; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
th:first-child { text-align: left; }
td { padding: 8px; border-bottom: 1px solid #f3f4f6; text-align: right; font-variant-numeric: tabular-nums; }
td:first-child { text-align: left; font-weight: 600; }
/* Zebra striping — filas alternadas como Excel */
tbody tr:nth-child(even) { background: #f8fafc; }
tbody tr:nth-child(odd)  { background: #ffffff; }
tbody tr:hover { background: #fef3c7; }
td.editable { cursor: pointer; }
td.editable:hover { background: #fef3c7; }
td input { width: 100%; padding: 4px; border: 1px solid var(--primary); border-radius: 4px; text-align: right; font: inherit; font-variant-numeric: tabular-nums; }
.row-total { background: #fef3c7; font-weight: 700; }
.row-empty td { color: #cbd5e1; }
.row-today { background: #ecfeff; }
.row-controlado { background: #f0fdf4; }
.row-controlado td:first-child::before { content: '✓ '; color: var(--green); }
.cell-derived { background: #f9fafb; color: var(--muted); }
.cell-derived.big { background: #eef2ff; color: #4338ca; font-weight: 700; }

/* Vista admin */
.admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
@media (max-width: 800px) {
  .admin-grid { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
}

.empty { padding: 60px 20px; text-align: center; color: var(--muted); }
.empty .icon { font-size: 42px; margin-bottom: 10px; }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; color: white; padding: 10px 18px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 999; pointer-events: none; }
#toast.show { opacity: 1; }
#toast.err { background: var(--primary); }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.chip-controlado { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.chip-controlado.si { background: var(--green-bg); color: #065f46; }
.chip-controlado.no { background: var(--orange-bg); color: #92400e; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <h1>📊 Ventas</h1>
    <p class="sub">Claudia Adorno · Carga de ventas diarias</p>
    <label>Local</label>
    <div class="local-grid">
      <div class="local-opt" data-local="alcorta" onclick="selectLocal(this)">
        <div class="icon">🛍️</div><div class="name">Alcorta</div>
      </div>
      <div class="local-opt" data-local="unicenter" onclick="selectLocal(this)">
        <div class="icon">🏬</div><div class="name">Unicenter</div>
      </div>
      <div class="local-opt" data-local="oficina" onclick="selectLocal(this)">
        <div class="icon">💻</div><div class="name">Oficina</div>
      </div>
    </div>
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="Contraseña del local" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-error"></div>
    <button class="btn-primary" id="login-btn" disabled onclick="doLogin()">Entrar →</button>
    <div class="admin-link"><a onclick="loginAdmin()">Entrar como administrador (JP)</a></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="header">
    <div class="header-left">
      <span class="header-title">📊 Ventas</span>
      <span class="header-local" id="hdr-local"></span>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="btn-notifs" onclick="toggleNotificaciones()" title="Activar notificaciones">🔕</button>
      <button class="btn-icon" id="refresh-btn" onclick="cargar()" title="Actualizar">↻</button>
      <button class="btn-secondary" onclick="logout()">Salir</button>
    </div>
  </div>

  <div id="alerta-sync-finmes" style="display:none;background:linear-gradient(90deg,#fed7aa,#fdba74);border-bottom:1px solid #ea580c;padding:10px 16px;align-items:center;gap:10px;flex-wrap:wrap;">
    <span style="font-size:18px;">📅</span>
    <span id="alerta-sync-finmes-text" style="flex:1;font-size:14px;color:#7c2d12;font-weight:600;"></span>
    <button id="alerta-sync-finmes-btn" onclick="hacerSyncFinDeMes()" style="padding:6px 14px;background:#c2410c;color:white;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">🐉 Sincronizar ahora</button>
  </div>

  <div id="alerta-cerrar-mes" style="display:none;background:linear-gradient(90deg,#fef3c7,#fde68a);border-bottom:1px solid #f59e0b;padding:10px 16px;display:none;align-items:center;gap:10px;flex-wrap:wrap;">
    <span style="font-size:18px;">🎉</span>
    <span id="alerta-cerrar-mes-text" style="flex:1;font-size:14px;color:#78350f;font-weight:600;"></span>
    <button id="alerta-cerrar-mes-btn" onclick="cerrarMesDesdeAlerta()" style="padding:6px 14px;background:#92400e;color:white;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;">🔒 Cerrar ahora</button>
    <button onclick="document.getElementById('alerta-cerrar-mes').style.display='none';" style="padding:4px 8px;background:transparent;border:none;color:#78350f;font-size:18px;cursor:pointer;" title="Cerrar aviso">×</button>
  </div>

  <div class="toolbar">
    <select id="sel-año" onchange="cargar()"></select>
    <select id="sel-mes" onchange="cargar()"></select>
    <select id="sel-local" onchange="cargar()" style="display:none;"></select>
    <div class="spacer"></div>
    <button id="btn-solicitudes" onclick="abrirGestionSolicitudes()" style="display:none;background:#fef3c7;color:#92400e;border-color:#fcd34d;font-weight:600;" title="Solicitudes de corrección pendientes de las vendedoras"></button>
    <button id="btn-reaperturas" onclick="abrirBandejaReaperturas()" style="background:#ede9fe;color:#5b21b6;border-color:#c4b5fd;font-weight:600;" title="Solicitudes de reapertura de día">🙏 Reaperturas</button>
    <button id="btn-dragonfish-mes" onclick="abrirCargaDragonfish('mes')" title="Re-sincroniza desde Dragonfish los días NO cerrados del mes seleccionado. Los días con 🏁 (cerrados) no se tocan.">🐉 Resincronizar mes</button>
    <button class="primary" id="btn-cargar-dia" onclick="abrirCarga()">+ Cargar venta del día</button>
    <button id="btn-cerrar-mes" onclick="cerrarMesActual()" style="display:none;background:#fef3c7;color:#92400e;border-color:#fcd34d;">🔒 Cerrar mes</button>
    <button id="btn-reabrir-mes" onclick="reabrirMesActual()" style="display:none;background:#fee2e2;color:#991b1b;border-color:#fca5a5;">🔓 Reabrir mes</button>
  </div>
  <div id="status-mes" style="background:white;padding:6px 16px;border-bottom:1px solid var(--border);font-size:12px;display:none;"></div>

  <div id="contenido"><div class="empty"><div class="spinner"></div></div></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════
const SUPA_URL = 'https://kwwiykssrpabncpqtmwi.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3d2l5a3NzcnBhYm5jcHF0bXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjI1NTQsImV4cCI6MjA5NDkzODU1NH0.O1VhKdjPahnJJ9qXcQuSKQbnKGhsEZqYmjDEfRuRpkc';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storageKey: 'ventas-adorno-auth' }
});

const LOCAL_EMAILS = {
  alcorta:   'alcorta@claudiaadorno.com',
  unicenter: 'unicenter@claudiaadorno.com',
  oficina:   'administracion@claudiaadorno.com',
};
const ADMIN_EMAIL = 'juanpsimonelli@gmail.com';
const LOCALES = {
  alcorta:   { nombre: 'Alcorta',   icon: '🛍️' },
  unicenter: { nombre: 'Unicenter', icon: '🏬' },
  oficina:   { nombre: 'Oficina',   icon: '💻' },
};

let session = null;  // { email, local_id|null, isAdmin }

// ════════════════════════════════════════════════════════════
// Web Push Notifications (misma VAPID public key que RRHH)
// ════════════════════════════════════════════════════════════
const VAPID_PUBLIC_KEY = 'BJr3r3C_T-euS9kqRZX561MoMjHtMl2wpMfS8oUA17xv1TdlA6E3S_5VKyQO2kqlqngPHrQSGr-PpJutXdgKsKc';

const pushManager = (() => {
  const soportado = () => 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
  function urlB64ToUint8(b64) {
    const pad = '='.repeat((4 - (b64.length % 4)) % 4);
    const s = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
    const raw = atob(s);
    const out = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
    return out;
  }
  async function estado() {
    if (!soportado()) return 'no-soportado';
    if (Notification.permission === 'denied') return 'bloqueado';
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) return 'activo';
    return 'inactivo';
  }
  async function activar() {
    if (!soportado()) throw new Error('Tu navegador no soporta notificaciones.');
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') throw new Error('Permiso denegado.');
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8(VAPID_PUBLIC_KEY),
      });
    }
    const raw = sub.toJSON();
    const { error } = await sb.from('ventas_push_subscriptions').upsert({
      user_email: session.email,
      endpoint: raw.endpoint,
      p256dh: raw.keys.p256dh,
      auth: raw.keys.auth,
      user_agent: (navigator.userAgent || '').slice(0, 200),
      last_used_at: new Date().toISOString(),
    }, { onConflict: 'endpoint' });
    if (error) throw error;
    return 'activo';
  }
  async function desactivar() {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if (sub) {
      try { await sb.from('ventas_push_subscriptions').delete().eq('endpoint', sub.endpoint); } catch(_) {}
      await sub.unsubscribe();
    }
    return 'inactivo';
  }
  return { soportado, estado, activar, desactivar };
})();

async function toggleNotificaciones() {
  const btn = document.getElementById('btn-notifs');
  try {
    const est = await pushManager.estado();
    if (est === 'activo') {
      if (!confirm('¿Desactivar notificaciones push?')) return;
      await pushManager.desactivar();
      toast('🔕 Notificaciones desactivadas');
    } else if (est === 'no-soportado') {
      alert('Tu navegador no soporta notificaciones push.');
    } else if (est === 'bloqueado') {
      alert('Las notificaciones están bloqueadas. Permitilas desde la configuración del browser.');
    } else {
      await pushManager.activar();
      toast('🔔 Notificaciones activadas');
    }
    actualizarBtnNotifs();
  } catch (e) { toast('Error: ' + e.message, true); }
}
async function actualizarBtnNotifs() {
  const btn = document.getElementById('btn-notifs');
  if (!btn) return;
  const est = await pushManager.estado();
  btn.textContent = est === 'activo' ? '🔔' : '🔕';
  btn.title = est === 'activo' ? 'Notificaciones activadas (click para desactivar)' : 'Activar notificaciones';
}

// Helper: enviar push al admin avisando una solicitud de corrección
async function notificarAdminCorreccion(localId, fecha, campo, valorActual, propuesto, motivo) {
  try {
    const labels = { efectivo:'efectivo', tarjeta:'tarjeta', qr:'QR', vales:'vales',
      online:'online', fc_oficina:'Fc Oficina', cant_transacciones:'cant. transacciones' };
    await sb.functions.invoke('ventas-enviar-push', {
      body: {
        para_admins: true,
        title: '📩 Nueva solicitud de corrección',
        body: `${LOCALES[localId]?.nombre || localId} · ${fecha} · ${labels[campo] || campo}: ${valorActual} → ${propuesto}`,
        url: location.origin + location.pathname,
        tag: 'ventas-correccion',
      }
    });
  } catch (e) { console.warn('push:', e); }
}

// ═══════════════════════════════════════════════════════════════════════
// URL FILTER — cada local tiene su shortcut: ?local=alcorta|unicenter|oficina
// Si está presente, la PWA se "ata" a ese local: oculta los demás botones,
// no permite entrar como admin, y si la sesión persistida corresponde a otro
// local, se cierra sesión automáticamente.
// ═══════════════════════════════════════════════════════════════════════
const URL_LOCAL = (() => {
  const p = new URLSearchParams(location.search).get('local');
  return p && LOCALES[p] ? p : null;
})();

const fmt$ = n => (n || 0).toLocaleString('es-AR', { maximumFractionDigits: 0 });
const fmtFecha = d => new Date(d + 'T12:00:00').toLocaleDateString('es-AR', { day: '2-digit', month: 'short' });
const hoyISO = () => new Date().toISOString().split('T')[0];
const escHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (err ? ' err' : '');
  setTimeout(() => { t.className = ''; }, 2800);
}

// ═══════════════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════════════
function selectLocal(el) {
  document.querySelectorAll('.local-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  checkLoginReady();
}
function checkLoginReady() {
  const sel = document.querySelector('.local-opt.selected');
  const pass = document.getElementById('login-pass').value.trim();
  document.getElementById('login-btn').disabled = !(sel && pass);
}
document.getElementById('login-pass').addEventListener('input', checkLoginReady);

// Si la URL trae ?local=, pre-fijar ese local y ocultar los demás + el link admin
(function aplicarURLLocal(){
  if (!URL_LOCAL) return;
  document.querySelectorAll('.local-opt').forEach(el => {
    if (el.dataset.local === URL_LOCAL) {
      el.classList.add('selected');
      el.style.cursor = 'default';
      el.onclick = null;
    } else {
      el.style.display = 'none';
    }
  });
  // Esconder link "entrar como admin" — esta URL es para vendedoras del local
  const adminLink = document.querySelector('.admin-link');
  if (adminLink) adminLink.style.display = 'none';
  // Mostrar nombre del local en el título
  const subEl = document.querySelector('.login-card .sub');
  if (subEl) subEl.textContent = LOCALES[URL_LOCAL].icon + ' ' + LOCALES[URL_LOCAL].nombre + ' · ingresá la contraseña';
  checkLoginReady();
})();

async function doLogin() {
  const localEl = document.querySelector('.local-opt.selected');
  const pass = document.getElementById('login-pass').value.trim();
  if (!localEl || !pass) return;
  const local = localEl.dataset.local;
  // Si la URL fija un local, no permitir loguearse a otro (defensa extra)
  if (URL_LOCAL && local !== URL_LOCAL) {
    document.getElementById('login-error').textContent = 'Esta URL es exclusiva de ' + LOCALES[URL_LOCAL].nombre;
    return;
  }
  const email = LOCAL_EMAILS[local];
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  document.getElementById('login-btn').disabled = true;
  try {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    session = { email, local_id: local, isAdmin: false };
    enterApp();
  } catch (e) {
    errEl.textContent = e.message || 'No se pudo entrar';
    document.getElementById('login-btn').disabled = false;
  }
}

async function loginAdmin() {
  if (URL_LOCAL) { alert('Esta URL es del local ' + LOCALES[URL_LOCAL].nombre + '. Para entrar como admin, abrí la URL sin parámetro.'); return; }
  const pass = prompt('Contraseña de administrador:');
  if (!pass) return;
  try {
    const { error } = await sb.auth.signInWithPassword({ email: ADMIN_EMAIL, password: pass.trim() });
    if (error) throw error;
    session = { email: ADMIN_EMAIL, local_id: null, isAdmin: true };
    enterApp();
  } catch (e) {
    alert('No se pudo entrar como admin: ' + (e.message || 'error'));
  }
}

async function logout() {
  await sb.auth.signOut();
  session = null;

// ═══════════════════════════════════════════════════════════════════════
// Aviso "mes listo para cerrar" — banner amarillo arriba
// Trigger: hay mes pasado con datos del último día calendario Y sin cerrar.
// ═══════════════════════════════════════════════════════════════════════
let _mesListoCerrar = null;  // {local, año, mes} para que el botón sepa qué cerrar

async function chequearMesesListosParaCerrar() {
  try {
    const localesACheckear = session.isAdmin
      ? Object.keys(LOCALES)
      : [session.local_id];

    const hoy = new Date();
    // Chequear hasta 3 meses hacia atrás
    const candidatos = [];
    for (let i = 1; i <= 3; i++) {
      const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
      const año = d.getFullYear();
      const mes = d.getMonth() + 1;
      const ultDia = new Date(año, mes, 0).getDate();
      const fechaUlt = `${año}-${String(mes).padStart(2,'0')}-${String(ultDia).padStart(2,'0')}`;
      for (const localId of localesACheckear) {
        candidatos.push({ localId, año, mes, fechaUlt });
      }
    }

    const listos = [];
    for (const c of candidatos) {
      // ¿Está cerrado? Si sí, saltear.
      const { data: cerr } = await sb.from('meses_cerrados_ventas')
        .select('id').eq('local', c.localId)
        .eq('año', c.año).eq('mes', c.mes).maybeSingle();
      if (cerr) continue;
      // ¿Tiene datos del último día del mes?
      const { data: vd } = await sb.from('ventas_diarias')
        .select('id').eq('local', c.localId).eq('fecha', c.fechaUlt).maybeSingle();
      if (vd) listos.push(c);
    }

    if (!listos.length) {
      document.getElementById('alerta-cerrar-mes').style.display = 'none';
      _mesListoCerrar = null;
      return;
    }

    // Tomar el mes más reciente (primero del array porque iteramos i=1 primero)
    const mLpc = listos[0];
    _mesListoCerrar = mLpc;
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const txt = listos.length === 1
      ? `${meses[mLpc.mes-1]} ${mLpc.año} de ${LOCALES[mLpc.localId].nombre} está listo para cerrar`
      : `${listos.length} mes(es) listos para cerrar. El más reciente: ${meses[mLpc.mes-1]} ${mLpc.año} de ${LOCALES[mLpc.localId].nombre}`;
    document.getElementById('alerta-cerrar-mes-text').textContent = txt;
    // Si no es admin, ocultar el botón "Cerrar ahora" (solo admin cierra)
    document.getElementById('alerta-cerrar-mes-btn').style.display = session.isAdmin ? '' : 'none';
    document.getElementById('alerta-cerrar-mes').style.display = 'flex';
  } catch (e) {
    console.warn('chequearMesesListosParaCerrar:', e);
  }
}

// ═══════════════════════════════════════════════════════════════════════
// Sync de fin de mes — banner obligatorio para vendedoras
// Aparece los primeros 7 días del mes siguiente si el mes anterior NO tiene
// el último día calendario cargado, y todavía no fue cerrado.
// ═══════════════════════════════════════════════════════════════════════
let _syncFinMesPendiente = null;  // { localId, año, mes, fechaUlt }

async function chequearSyncFinDeMes() {
  try {
    const hoy = new Date();
    const dia = hoy.getDate();
    const mesActualLastDay = new Date(hoy.getFullYear(), hoy.getMonth()+1, 0).getDate();

    // Determinar qué mes necesita el sync:
    //  - Si hoy es el ÚLTIMO día del mes actual → ese mes es el objetivo
    //  - Si estamos del 1 al 7 del mes siguiente → el mes anterior es el objetivo
    //  - Sino → no mostrar nada
    let añoAnt, mesAnt;
    if (dia === mesActualLastDay) {
      añoAnt = hoy.getFullYear();
      mesAnt = hoy.getMonth() + 1;
    } else if (dia <= 7) {
      const ant = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);
      añoAnt = ant.getFullYear();
      mesAnt = ant.getMonth() + 1;
    } else {
      document.getElementById('alerta-sync-finmes').style.display = 'none';
      _syncFinMesPendiente = null;
      return;
    }
    const ultDia = new Date(añoAnt, mesAnt, 0).getDate();
    const fechaUlt = `${añoAnt}-${String(mesAnt).padStart(2,'0')}-${String(ultDia).padStart(2,'0')}`;

    const localesACheckear = session.isAdmin
      ? Object.keys(LOCALES)
      : [session.local_id];

    for (const localId of localesACheckear) {
      // ¿Cerrado?
      const { data: cerr } = await sb.from('meses_cerrados_ventas')
        .select('id').eq('local', localId).eq('año', añoAnt).eq('mes', mesAnt).maybeSingle();
      if (cerr) continue;
      // ¿Tiene el último día?
      const { data: vd } = await sb.from('ventas_diarias')
        .select('id').eq('local', localId).eq('fecha', fechaUlt).maybeSingle();
      if (vd) continue;  // ya está, no hay que sincronizar
      // Falta sync de fin de mes
      _syncFinMesPendiente = { localId, año: añoAnt, mes: mesAnt, fechaUlt };
      const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
      const txt = session.isAdmin
        ? `📅 Falta el sync de fin de mes para ${meses[mesAnt-1]} ${añoAnt} de ${LOCALES[localId].nombre}`
        : `📅 Tenés que hacer el sync de fin de mes de ${meses[mesAnt-1]} ${añoAnt} antes de que JP cierre el mes`;
      document.getElementById('alerta-sync-finmes-text').textContent = txt;
      document.getElementById('alerta-sync-finmes').style.display = 'flex';
      return;
    }
    // Si llegamos acá, ningún local lo necesita
    document.getElementById('alerta-sync-finmes').style.display = 'none';
    _syncFinMesPendiente = null;
  } catch (e) { console.warn('chequearSyncFinDeMes:', e); }
}

async function hacerSyncFinDeMes() {
  if (!_syncFinMesPendiente) return;
  const { localId, año, mes } = _syncFinMesPendiente;
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const label = `${meses[mes-1]} ${año}`;
  const desde = `${año}-${String(mes).padStart(2,'0')}-01`;
  const ultDia = new Date(año, mes, 0).getDate();
  const hasta = `${año}-${String(mes).padStart(2,'0')}-${String(ultDia).padStart(2,'0')}`;
  try {
    toast(`🐉 Pidiendo sync de fin de mes (${label})…`);
    const { data: job, error } = await sb.from('dragonfish_jobs').insert({
      local: localId, fecha: desde,
      tipo: 'mes', fecha_desde: desde, fecha_hasta: hasta,
      estado: 'pendiente',
      solicitado_por: session.email,
    }).select().single();
    if (error) throw error;
    // Polling hasta que termine (con timeout)
    const ok = await esperarJob(job.id, 240);  // hasta 4 minutos
    if (ok) {
      toast(`✓ ${label} sincronizado completo`);
      // Avisar al admin con push (fire and forget) si la vendedora completó el sync
      if (!session.isAdmin) {
        notificarAdminCierreListo(localId, año, mes);
      }
      cargar();
      chequearSyncFinDeMes();
      chequearMesesListosParaCerrar();
    }
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function notificarAdminCierreListo(localId, año, mes) {
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  try {
    await sb.functions.invoke('ventas-enviar-push', {
      body: {
        para_admins: true,
        title: '✅ Sync de fin de mes completo',
        body: `${meses[mes-1]} ${año} de ${LOCALES[localId]?.nombre} está sincronizado. Listo para cerrar.`,
        url: location.origin + location.pathname,
        tag: 'ventas-finmes-listo',
      }
    });
  } catch (e) { console.warn('push fin de mes:', e); }
}

function cerrarMesDesdeAlerta() {
  if (!_mesListoCerrar) return;
  // Posicionar selectores en el mes/local del aviso y disparar cierre
  document.getElementById('sel-año').value = _mesListoCerrar.año;
  document.getElementById('sel-mes').value = _mesListoCerrar.mes;
  if (session.isAdmin) {
    document.getElementById('sel-local').value = _mesListoCerrar.localId;
  }
  cargar();
  setTimeout(() => cerrarMesActual(), 400);

async function cargar() {
  const año = parseInt(document.getElementById('sel-año').value);
  const mes = parseInt(document.getElementById('sel-mes').value);
  const localSel = session.isAdmin ? document.getElementById('sel-local').value : session.local_id;
  document.getElementById('refresh-btn').innerHTML = '<span class="spinner"></span>';

  // Chequear si el mes está cerrado para este local (sólo si hay local específico)
  const localUnico = localSel && localSel !== 'todos' ? localSel : null;
  let cerrado = null;
  if (localUnico) {
    try {
      const r = await sb.from('meses_cerrados_ventas')
        .select('id, cerrado_por, cerrado_at')
        .eq('local', localUnico).eq('año', año).eq('mes', mes).maybeSingle();
      cerrado = r.data;
    } catch(_) {}
  }
  _actualizarBotonesCierre(cerrado, localUnico);

  try {
    const desde = `${año}-${String(mes).padStart(2,'0')}-01`;
    const hastaDate = new Date(año, mes, 0);
    const hasta = hastaDate.toISOString().split('T')[0];

    let q = sb.from('ventas_diarias_view')
      .select('*')
      .gte('fecha', desde).lte('fecha', hasta)
      .order('fecha');
    if (localSel && localSel !== 'todos') q = q.eq('local', localSel);
    const { data, error } = await q;
    if (error) throw error;

    // Traer correcciones aplicadas + pendientes para el rango (para resaltar celdas)
    let aplicadas = [];
    let pendientes = [];
    let turnos = [];
    if (localUnico) {
      const [resAp, resPe, resTu] = await Promise.all([
        sb.from('ventas_correcciones_aplicadas')
          .select('*').eq('local', localUnico)
          .gte('fecha', desde).lte('fecha', hasta),
        sb.from('ventas_correcciones')
          .select('*').eq('local', localUnico).eq('estado', 'pendiente')
          .gte('fecha', desde).lte('fecha', hasta)
          .order('solicitado_at', { ascending: false }),
        sb.from('ventas_turnos_view')
          .select('*').eq('local', localUnico)
          .gte('fecha', desde).lte('fecha', hasta)
          .order('numero'),
      ]);
      aplicadas = resAp.data || [];
      pendientes = resPe.data || [];
      turnos = resTu.data || [];
    }

    if (session.isAdmin && localSel === 'todos') {
      renderAdminConsolidado(data || [], año, mes);
    } else {
      renderGrillaLocal(data || [], año, mes, localSel, aplicadas, pendientes, turnos);
    }
    // Refrescar badge de solicitudes pendientes (para admin)
    if (session.isAdmin) refrescarBadgeSolicitudes();
    refrescarBadgeReaperturas();
  } catch (e) {
    document.getElementById('contenido').innerHTML = `<div class="empty"><div class="icon">⚠️</div>Error: ${escHtml(e.message)}</div>`;
  } finally {
    document.getElementById('refresh-btn').innerHTML = '↻';
  }
}

// ─── Grilla mensual de un local ──────────────────────────────────────
// Tarjeta (Clover) se discontinuó al cierre de junio 2026.
// A partir de julio 2026 la columna no se muestra en la planilla.
const FECHA_FIN_TARJETA = '2026-06-30';

function renderGrillaLocal(ventas, año, mes, localId, aplicadas, pendientes, turnos) {
  aplicadas = aplicadas || [];
  pendientes = pendientes || [];
  turnos = turnos || [];
  // ¿Mostramos la columna Tarjeta en este mes?
  const primerDiaMes = `${año}-${String(mes).padStart(2,'0')}-01`;
  const mostrarTarjeta = primerDiaMes <= FECHA_FIN_TARJETA;
  // Map de correcciones aplicadas por (fecha, campo)
  const mapAp = {};
  aplicadas.forEach(c => { mapAp[`${c.fecha}_${c.campo}`] = c; });
  // Map de pendientes por (fecha, campo)
  const mapPe = {};
  pendientes.forEach(c => { mapPe[`${c.fecha}_${c.campo}`] = c; });
  // Map de turnos por fecha (arreglo ordenado por numero)
  const mapTurnos = {};
  turnos.forEach(t => {
    if (!mapTurnos[t.fecha]) mapTurnos[t.fecha] = [];
    mapTurnos[t.fecha].push(t);
  });
  // Guardar global para que abrirTurnos() pueda leer sin re-query
  window._turnosPorFecha = mapTurnos;
  window._localActual = localId;

  const cont = document.getElementById('contenido');
  const diasMes = new Date(año, mes, 0).getDate();
  const hoy = hoyISO();
  const porFecha = {};
  ventas.forEach(v => { porFecha[v.fecha] = v; });

  // KPIs del mes
  let totShopping = 0, totTotal = 0, totEfectivo = 0, totTarjeta = 0, totQR = 0,
      totTransferencia = 0, totCC = 0,
      totVales = 0, totOnline = 0, totFcOf = 0, totCant = 0;
  ventas.forEach(v => {
    totShopping      += +v.shopping || 0;
    totTotal         += +v.total    || 0;
    totEfectivo      += +v.efectivo || 0;
    totTarjeta       += +v.tarjeta  || 0;
    totQR            += +v.qr       || 0;
    totTransferencia += +v.transferencia || 0;
    totCC            += +v.cc       || 0;
    totVales         += +v.vales    || 0;
    totOnline        += +v.online   || 0;
    totFcOf          += +v.fc_oficina || 0;
    totCant          += +v.cant_transacciones || 0;
  });
  const ticketProm = totCant > 0 ? Math.round(totShopping / totCant) : 0;
  const diasConVenta = ventas.filter(v => (v.shopping||0) > 0).length;
  const promDiario = diasConVenta > 0 ? Math.round(totTotal / diasConVenta) : 0;

  // Render
  let acum = 0;
  const filas = [];
  for (let d = 1; d <= diasMes; d++) {
    const fecha = `${año}-${String(mes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const v = porFecha[fecha];
    const shopping = v ? +v.shopping || 0 : 0;
    const total = v ? +v.total || 0 : 0;
    acum += total;
    const esHoy = fecha === hoy;
    const klass = [
      !v ? 'row-empty' : '',
      esHoy ? 'row-today' : '',
      v?.controlado ? 'row-controlado' : '',
    ].filter(Boolean).join(' ');
    // Helper: render de una celda numérica con resaltado por corrección
    const celda = (campo, valor) => {
      const k = `${fecha}_${campo}`;
      const ap = mapAp[k];
      const pe = mapPe[k];
      let style = '';
      let title = '';
      let badge = '';
      if (ap) {
        style = 'background:#fef3c7;';   // amarillo claro
        title = `Corregido manualmente: ${fmt$(ap.valor_anterior)} → ${fmt$(ap.valor_propuesto)}\nMotivo: ${ap.motivo}\nPor: ${ap.solicitado_por||'?'} · Aprobó: ${ap.resuelto_por||'?'}`;
      }
      if (pe) {
        style += 'border:2px solid #f59e0b;';
        badge = ' 📝';
        title = (title?title+'\n\n':'') + `Solicitud pendiente: ${fmt$(pe.valor_anterior)} → ${fmt$(pe.valor_propuesto)}\nMotivo: ${pe.motivo}\nPor: ${pe.solicitado_por}`;
      }
      // Determinar acción al click según rol y campo
      let onclick;
      if (session.isAdmin) {
        // Admin: click en cualquier celda abre el editar completo
        onclick = `event.stopPropagation(); abrirEditar('${fecha}','${localId}',${JSON.stringify(v||null).replace(/"/g,'&quot;')})`;
      } else if (campo === 'fc_oficina') {
        // Vendedora: fc_oficina sigue editable (mini modal con SOLO ese campo)
        onclick = `event.stopPropagation(); abrirEditarFcOficina('${fecha}','${localId}',${JSON.stringify(v||null).replace(/"/g,'&quot;')})`;
      } else {
        // Vendedora + otra celda: pedir corrección
        const valActual = v ? (v[campo] || 0) : 0;
        onclick = `event.stopPropagation(); abrirSolicitudCorreccion('${fecha}','${localId}','${campo}',${valActual})`;
      }
      const display = v ? (campo === 'cant_transacciones' ? (valor || '—') : fmt$(valor)) : '—';
      return `<td class="editable" style="${style}cursor:pointer;" title="${escHtml(title)}" onclick="${onclick}">${display}${badge}</td>`;
    };

    // ── Columna de turnos ──
    // Si hay turnos cerrados, mostramos badge con cantidad y si hay discrepancia
    // Si es HOY y hay venta cargada, mostramos botón "🔒 Cerrar turno"
    const turnosDelDia = mapTurnos[fecha] || [];
    const nTurnos = turnosDelDia.length;
    const conDiscrep = turnosDelDia.filter(t =>
      t.estado_discrepancia && t.estado_discrepancia !== 'ok'
    ).length;

    let celdaTurno = '<td class="cell-derived">—</td>';
    if (nTurnos > 0 || v) {
      const diaCerrado = !!v?.controlado;
      const badgeColor = conDiscrep > 0 ? '#fee2e2' : (diaCerrado ? '#e0e7ff' : '#dcfce7');
      const badgeTxt   = conDiscrep > 0 ? '#991b1b' : (diaCerrado ? '#3730a3' : '#166534');
      const badgeIcon  = diaCerrado ? '🏁 ' : '';
      const badge = nTurnos > 0
        ? `<span style="background:${badgeColor};color:${badgeTxt};padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;">${badgeIcon}${nTurnos} turno${nTurnos>1?'s':''}${conDiscrep>0?' ⚠':''}</span>`
        : (diaCerrado ? `<span style="background:#e0e7ff;color:#3730a3;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;">🏁 cerrado</span>` : '');
      // El botón aparece si hay ventas del día por cualquier medio
      // (shopping incluye solo físico; para Oficina las ventas vienen por
      // transferencia/CC/MP-Web, así que usamos total).
      // NO aparece si el día está cerrado (controlado=true).
      const hayVenta = v && ((+v.shopping||0) > 0 || (+v.total||0) > 0);
      const puedeCerrar = esHoy && hayVenta && !diaCerrado;
      const botonCerrar = puedeCerrar
        ? `<button onclick="event.stopPropagation();cerrarTurnoAhora('${fecha}','${localId}')" title="Cerrar el turno actual" style="background:#7c3aed;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;margin-left:6px;">🔒 Cerrar</button>`
        : '';
      const botonCerrarDia = puedeCerrar
        ? `<button onclick="event.stopPropagation();cerrarDiaAhora('${fecha}','${localId}')" title="Cerrar el día — no se podrán abrir más turnos" style="background:#dc2626;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;margin-left:4px;">🏁 Cerrar Día</button>`
        : '';
      const verLink = nTurnos > 0
        ? `<button onclick="event.stopPropagation();abrirTurnos('${fecha}','${localId}')" title="Ver detalle de turnos" style="background:none;border:1px solid #cbd5e1;color:#475569;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;margin-left:4px;">Ver</button>`
        : '';
      const linkReabrir = (diaCerrado && session?.isAdmin)
        ? `<button onclick="event.stopPropagation();reabrirDiaAhora('${fecha}','${localId}')" title="Reabrir el día (solo admin)" style="background:none;border:1px solid #f59e0b;color:#92400e;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;margin-left:4px;">🔓 Reabrir</button>`
        : '';
      const botonSolicitar = (diaCerrado && !session?.isAdmin)
        ? `<button onclick="event.stopPropagation();solicitarReaperturaAhora('${fecha}','${localId}')" title="Pedirle al admin que reabra este día" style="background:none;border:1px solid #c4b5fd;color:#5b21b6;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;margin-left:4px;">🙏 Pedir reapertura</button>`
        : '';
      celdaTurno = `<td style="text-align:center;white-space:nowrap;">${badge}${verLink}${botonCerrar}${botonCerrarDia}${linkReabrir}${botonSolicitar}</td>`;
    }

    filas.push(`
      <tr class="${klass}">
        <td>${fmtFecha(fecha)}</td>
        ${celda('efectivo', v?.efectivo)}
        ${mostrarTarjeta ? celda('tarjeta', v?.tarjeta) : ''}
        ${celda('qr', v?.qr)}
        ${celda('transferencia', v?.transferencia)}
        ${celda('cc', v?.cc)}

// ─── Vista admin consolidada (todos los locales) ─────────────────────
function renderAdminConsolidado(ventas, año, mes) {
  const cont = document.getElementById('contenido');
  const diasMes = new Date(año, mes, 0).getDate();
  // Estructura: porFechaLocal[fecha][local] = total
  const porFecha = {};
  ventas.forEach(v => {
    if (!porFecha[v.fecha]) porFecha[v.fecha] = {};
    porFecha[v.fecha][v.local] = +v.total || 0;
  });

  const locales = ['alcorta', 'unicenter', 'oficina'];
  const totLocales = { alcorta: 0, unicenter: 0, oficina: 0 };
  const acumLocales = { alcorta: 0, unicenter: 0, oficina: 0 };
  const filas = [];
  for (let d = 1; d <= diasMes; d++) {
    const fecha = `${año}-${String(mes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dia = porFecha[fecha] || {};
    const cells = locales.map(loc => {
      const v = dia[loc] || 0;
      totLocales[loc] += v;
      acumLocales[loc] += v;
      return `<td>${v ? fmt$(v) : '<span style="color:#cbd5e1">—</span>'}</td><td class="cell-derived">${fmt$(acumLocales[loc])}</td>`;
    }).join('');
    const totalDia = locales.reduce((s, loc) => s + (dia[loc]||0), 0);
    filas.push(`<tr><td>${fmtFecha(fecha)}</td>${cells}<td class="cell-derived big">${totalDia ? fmt$(totalDia) : '—'}</td></tr>`);
  }
  const granTotal = totLocales.alcorta + totLocales.unicenter + totLocales.oficina;

  cont.innerHTML = `
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Total general</div><div class="kpi-value">${fmt$(granTotal)}</div></div>
      <div class="kpi"><div class="kpi-label">🛍️ Alcorta</div><div class="kpi-value">${fmt$(totLocales.alcorta)}</div></div>
      <div class="kpi"><div class="kpi-label">🏬 Unicenter</div><div class="kpi-value">${fmt$(totLocales.unicenter)}</div></div>
      <div class="kpi"><div class="kpi-label">💻 Oficina</div><div class="kpi-value">${fmt$(totLocales.oficina)}</div></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th rowspan="2" style="vertical-align:bottom;">Fecha</th>
            <th colspan="2" style="text-align:center;">🛍️ Alcorta</th>
            <th colspan="2" style="text-align:center;">🏬 Unicenter</th>
            <th colspan="2" style="text-align:center;">💻 Oficina</th>
            <th rowspan="2" style="vertical-align:bottom;">Total día</th>
          </tr>
          <tr>
            <th>Diaria</th><th>Acumulado</th>
            <th>Diaria</th><th>Acumulado</th>
            <th>Diaria</th><th>Acumulado</th>
          </tr>
        </thead>
        <tbody>${filas.join('')}</tbody>
        <tfoot>
          <tr class="row-total">
            <td>TOTAL</td>
            <td>${fmt$(totLocales.alcorta)}</td><td>—</td>
            <td>${fmt$(totLocales.unicenter)}</td><td>—</td>
            <td>${fmt$(totLocales.oficina)}</td><td>—</td>
            <td>${fmt$(granTotal)}</td>
          </tr>
        </tfoot>
      </table>
    </div>
  `;
}

async function guardarFcOficina(fecha, localId, vId) {
  const btn = document.getElementById('btn-guardar-fcof');
  const errEl = document.getElementById('form-error');
  const valor = parseFloat(document.getElementById('f-fc-of').value || '0');
  if (errEl) { errEl.style.display='none'; errEl.textContent=''; }
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
  try {
    const data = { local: localId, fecha, fc_oficina: valor, cargado_por: session.email };
    const res = vId
      ? await sb.from('ventas_diarias').update({ fc_oficina: valor }).eq('id', vId)
      : await sb.from('ventas_diarias').upsert(data, { onConflict: 'local,fecha' });
    if (res.error) throw res.error;
    cerrarModal(); toast('✓ Fc Oficina guardado'); cargar();
  } catch (e) {
    if (errEl) { errEl.textContent = e.message; errEl.style.display = 'block'; }
    if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; }
  }
}

async function enviarSolicitudCorreccion(fecha, localId, campo, valorActual) {
  const btn = document.getElementById('btn-pedir');
  const errEl = document.getElementById('form-error');
  const propuesto = parseFloat(document.getElementById('f-correcto').value);
  const motivo = document.getElementById('f-motivo').value.trim();
  if (errEl) { errEl.style.display='none'; errEl.textContent=''; }
  if (isNaN(propuesto)) { errEl.textContent='Poné el valor correcto'; errEl.style.display='block'; return; }
  if (!motivo || motivo.length < 5) { errEl.textContent='Escribí un motivo (mínimo 5 caracteres)'; errEl.style.display='block'; return; }
  if (btn) { btn.disabled = true; btn.textContent = 'Enviando…'; }
  try {
    const { error } = await sb.from('ventas_correcciones').insert({
      local: localId, fecha, campo,
      valor_anterior: valorActual, valor_propuesto: propuesto,
      motivo, solicitado_por: session.email,
    });
    if (error) throw error;
    // Avisar al admin con push (no esperamos, fire-and-forget)
    notificarAdminCorreccion(localId, fecha, campo, valorActual, propuesto, motivo);
    cerrarModal();
    toast('✓ Solicitud enviada. JP la va a revisar.');
    cargar();
  } catch (e) {
    if (errEl) { errEl.textContent = e.message; errEl.style.display = 'block'; }
    if (btn) { btn.disabled = false; btn.textContent = 'Enviar pedido →'; }
  }
}

      estado,

  const errEl = document.getElementById('form-error');
  const num = id => {
    const v = document.getElementById(id).value;
    return v === '' ? 0 : parseFloat(v);
  };
  const intNum = id => {
    const v = document.getElementById(id).value;
    return v === '' ? 0 : parseInt(v);
  };
  const data = {
    local: localId,
    fecha: fecha,
    efectivo: num('f-efectivo'),
    tarjeta: num('f-tarjeta'),
    qr: num('f-qr'),
    vales: num('f-vales'),
    online: num('f-online'),
    fc_oficina: num('f-fc-of'),
    cant_transacciones: intNum('f-cant'),
    controlado: document.getElementById('f-controlado').checked,
    cargado_por: session.email,
    origen: 'manual',
  };
  if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
  try {
    let res;
    if (vId) {
      res = await sb.from('ventas_diarias').update(data).eq('id', vId);
    } else {
      // Upsert por (local, fecha) para no romper si ya existe
      res = await sb.from('ventas_diarias').upsert(data, { onConflict: 'local,fecha' });
    }
    if (res.error) throw res.error;
    cerrarModal();
    toast('✓ Guardado');
    cargar();
  } catch (e) {
    if (errEl) { errEl.textContent = e.message || 'Error al guardar'; errEl.style.display = 'block'; }
    if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; }
  }
}

// ─── Cargar desde Dragonfish: inserta job + polling ──────────────────
// modo: '3d' (últimos 3 días, rápido) o 'mes' (mes completo, admin)
async function abrirCargaDragonfish(modo) {
  modo = modo || '3d';
  const localId = session.isAdmin ? document.getElementById('sel-local').value : session.local_id;
  if (session.isAdmin && (!localId || localId === 'todos')) {
    toast('Elegí un local específico antes', true);
    return;
  }
  const año = parseInt(document.getElementById('sel-año').value);
  const mes = parseInt(document.getElementById('sel-mes').value);

  // Calcular rango según modo
  let desde, hasta, label;
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  if (modo === 'mes') {
    desde = `${año}-${String(mes).padStart(2,'0')}-01`;
    const ultDia = new Date(año, mes, 0).getDate();
    hasta = `${año}-${String(mes).padStart(2,'0')}-${String(ultDia).padStart(2,'0')}`;
    label = `${meses[mes-1]} ${año}`;
    if (!confirm(`Resincronizar TODO ${label} de ${LOCALES[localId].nombre} desde Dragonfish.\n\nVa a sobreescribir cualquier dato manual del mes con los valores actuales del Dragonfish.\n\n¿Confirmás?`)) return;
  } else {
    // '3d' = últimos 3 días (hoy, ayer, antesdeayer)
    const hoy = new Date();
    const ant = new Date(hoy); ant.setDate(hoy.getDate() - 2);
    const toISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    desde = toISO(ant);
    hasta = toISO(hoy);
    label = 'últimos 3 días';
  }

  // Verificar si el mes del rango está cerrado
  const fechaCheck = new Date(desde + 'T12:00:00');
  const { data: cerrado } = await sb.from('meses_cerrados_ventas')
    .select('id').eq('local', localId)
    .eq('año', fechaCheck.getFullYear()).eq('mes', fechaCheck.getMonth()+1)
    .maybeSingle();
  if (cerrado) {
    toast(`🔒 El mes ${desde.slice(0,7)} está cerrado. Reabrir primero para sincronizar.`, true);
    return;
  }

  toast(`🐉 Pidiendo al servicio local (${label})…`);
  try {
    const { data: job, error } = await sb.from('dragonfish_jobs').insert({
      local: localId, fecha: desde,
      tipo: 'mes', fecha_desde: desde, fecha_hasta: hasta,
      estado: 'pendiente',
      solicitado_por: session.email,
    }).select().single();
    if (error) throw error;
    pollJob(job.id, localId, label);
  } catch (e) {
    toast('Error: ' + e.message, true);
  }
}

async function pollJob(jobId, localId, label) {
  const MAX_INTENTOS = 200;  // 200 × 3s = 10 min máximo (mes completo)
  let intentos = 0;
  const tickear = async () => {
    intentos++;
    try {
      const { data: j } = await sb.from('dragonfish_jobs').select('*').eq('id', jobId).single();
      if (!j) return;
      if (j.estado === 'completado') {
        const p = j.payload || {};
        const n = p.dias_procesados || 0;
        toast(`✓ ${LOCALES[localId]?.nombre} ${label}: ${n} día(s) sincronizado(s)`);
        cargar();
        // Después de cada sync, re-chequear si algún mes pasado quedó listo para cerrar
        chequearMesesListosParaCerrar();
        return;
      }
      if (j.estado === 'error') {
        toast(`✗ Error sync: ${j.error_msg || 'desconocido'}`, true);
        return;
      }
      if (intentos >= MAX_INTENTOS) {
        toast(`⏳ Tomando demasiado. Job #${jobId} sigue procesando.`, true);
        return;
      }
      setTimeout(tickear, 3000);
    } catch (e) {
      console.warn('poll error', e);
      setTimeout(tickear, 5000);
    }
  };
  tickear();
}

// Espera hasta que el job termine. Devuelve true si completó OK, false si falló o timeout.
async function esperarJob(jobId, timeoutSec) {
  const t0 = Date.now();
  while ((Date.now() - t0) < timeoutSec * 1000) {
    const { data: j } = await sb.from('dragonfish_jobs').select('estado, error_msg').eq('id', jobId).single();
    if (j?.estado === 'completado') return true;
    if (j?.estado === 'error') { toast(`✗ Sync error: ${j.error_msg||'desconocido'}`, true); return false; }
    await new Promise(r => setTimeout(r, 2000));
  }
  return false;
}

/** Cierra el turno actual del local en la fecha dada.
 *  Llama a la función SQL cerrar_turno() vía RPC y muestra el resultado. */
async function cerrarTurnoAhora(fecha, localId) {
  const yaCerrados = (window._turnosPorFecha?.[fecha] || []).length;
  const numero = yaCerrados + 1;
  const msg = `¿Cerrar turno ${numero} del ${fmtFecha(fecha)} en ${localId.toUpperCase()}?\n\n`
            + `Esto guarda un snapshot con los valores actuales del día menos los turnos previos\n`
            + `y cruza con la cuenta MP para detectar discrepancias.`;
  if (!confirm(msg)) return;

  const cerradoPor = session?.isAdmin
    ? `admin:${session?.email || '?'}`
    : `local:${localId}`;

  // PRE-SYNC 1/2: forzar sync de Dragonfish para el DÍA actual antes de cerrar.
  // Esto trae las últimas ventas que estaban en proceso/sin sincronizar.
  toast('🐉 Sincronizando ventas del día...');
  try {
    const { data: job, error: jobErr } = await sb.from('dragonfish_jobs').insert({
      local: localId,
      fecha: fecha,
      tipo: 'mes',         // reusamos tipo='mes' con rango de 1 día
      fecha_desde: fecha,
      fecha_hasta: fecha,
      estado: 'pendiente',
      solicitado_por: session?.email || 'cerrar_turno',
    }).select().single();
    if (jobErr) throw jobErr;
    // Esperar hasta 30 seg (suele ser <5s en práctica)
    await esperarJob(job.id, 30);
  } catch (e) {
    console.warn('pre-sync Dragonfish falló (sigo igual):', e);
  }

  // PRE-SYNC 2/2: traer los pagos MP de los últimos 30 min para evitar
  // discrepancia por lag del scraper horario.
  toast('💳 Sincronizando últimos pagos MP...');
  try {
    const { data: syncRes, error: syncErr } = await sb.functions.invoke('sync-mp-on-demand', {
      body: { minutes_back: 30 },
    });
    if (syncErr) {
      console.warn('sync-mp-on-demand falló (sigo igual):', syncErr);
    } else if (syncRes?.sincronizados !== undefined) {
      console.log(`Sync MP: ${syncRes.sincronizados} movs actualizados`);
    }
  } catch (e) {
    console.warn('sync-mp-on-demand exception (sigo igual):', e);
  }

  try {
    const { data, error } = await sb.rpc('cerrar_turno', {
      p_local: localId,
      p_fecha: fecha,
      p_cerrado_por: cerradoPor,
      p_notas: null,
    });
    if (error) throw error;
    toast(`✓ Turno ${data.numero} cerrado`);
    // Mostrar resultado inmediato + detalle de discrepancia
    mostrarResultadoTurno(data, fecha, localId);
    // Refrescar grilla
    if (typeof verPlanilla === 'function') {
      verPlanilla();
    } else {
      location.reload();
    }
  } catch (e) {
    alert('Error al cerrar turno: ' + e.message);
  }
}

/** Cierra el DÍA completo:
 *   - Si hay ventas pendientes (no cerradas en turno), crea automáticamente
 *     un turno final con todo lo restante.
 *   - Marca el día como controlado (no se pueden cerrar más turnos).
 *   Solo admin puede después reabrirlo con reabrirDiaAhora(). */
async function cerrarDiaAhora(fecha, localId) {
  const yaCerrados = (window._turnosPorFecha?.[fecha] || []).length;
  const msg = `¿Cerrar el DÍA ${fmtFecha(fecha)} en ${localId.toUpperCase()}?\n\n`
            + (yaCerrados > 0
                ? `Hay ${yaCerrados} turno${yaCerrados>1?'s':''} ya cerrado${yaCerrados>1?'s':''}. `
                : '')
            + `Si hay ventas pendientes, se cierra el turno final automáticamente con cruce MP.\n\n`
            + `⚠ Después de cerrar el día, NO se podrán abrir más turnos.`;
  if (!confirm(msg)) return;

  const cerradoPor = session?.isAdmin
    ? `admin:${session?.email || '?'}`
    : `local:${localId}`;

  // PRE-SYNC Dragonfish del día actual
  toast('🐉 Sincronizando ventas del día...');
  try {
    const { data: job, error: jobErr } = await sb.from('dragonfish_jobs').insert({
      local: localId,
      fecha: fecha,
      tipo: 'mes',
      fecha_desde: fecha,
      fecha_hasta: fecha,
      estado: 'pendiente',
      solicitado_por: session?.email || 'cerrar_dia',
    }).select().single();
    if (jobErr) throw jobErr;
    await esperarJob(job.id, 30);
  } catch (e) {
    console.warn('pre-sync Dragonfish falló (sigo igual):', e);
  }

  // PRE-SYNC MP (mismo patrón que cerrarTurnoAhora)
  toast('💳 Sincronizando últimos pagos MP...');
  try {
    await sb.functions.invoke('sync-mp-on-demand', { body: { minutes_back: 30 } });
  } catch (e) {
    console.warn('sync-mp-on-demand falló (sigo igual):', e);
  }

  try {
    const { data, error } = await sb.rpc('cerrar_dia', {
      p_local: localId,
      p_fecha: fecha,
      p_cerrado_por: cerradoPor,
      p_notas: null,
    });
    if (error) throw error;
    toast(`🏁 Día cerrado`);
    // Si se creó un turno final, mostrar su detalle
    if (data?.turno_creado) {
      mostrarResultadoTurno(data.turno_creado, fecha, localId);
    }
    // Refrescar grilla
    if (typeof verPlanilla === 'function') {
      verPlanilla();
    } else {
      location.reload();
    }
  } catch (e) {
    alert('Error al cerrar día: ' + e.message);
  }
}

/** Bandeja de solicitudes de reapertura.
 *  Admin: ve pendientes con botones aprobar/rechazar.
 *  Vendedora: ve solo sus propias (todas, con estado). */
async function abrirBandejaReaperturas() {
  document.getElementById('modal-reaperturas')?.remove();
  const wrap = document.createElement('div');
  wrap.id = 'modal-reaperturas';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  wrap.onclick = (e) => { if (e.target === wrap) wrap.remove(); };
  wrap.innerHTML = `
    <div style="background:#fff;border-radius:12px;max-width:760px;width:100%;max-height:85vh;overflow:auto;padding:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <h3 style="margin:0;font-size:18px;">🙏 Reaperturas</h3>
        <button onclick="document.getElementById('modal-reaperturas').remove();" style="background:none;border:none;cursor:pointer;font-size:18px;color:#64748b;">✕</button>
      </div>
      <div id="reaperturas-body"><div style="text-align:center;color:#64748b;padding:30px;">Cargando…</div></div>
    </div>`;
  document.body.appendChild(wrap);

  // Cargar solicitudes (RLS ya filtra: admin ve todo, vendedora ve solo lo suyo)
  const { data, error } = await sb.from('ventas_reaperturas')
    .select('*')
    .order('solicitado_at', { ascending: false })
    .limit(50);
  if (error) {
    document.getElementById('reaperturas-body').innerHTML = `<div style="color:#dc2626;">Error: ${escHtml(error.message)}</div>`;
    return;
  }
  if (!data || !data.length) {
    document.getElementById('reaperturas-body').innerHTML = `<div style="text-align:center;color:#64748b;padding:30px;">No hay solicitudes.</div>`;
    return;
  }

  const pendientes = data.filter(r => r.estado === 'pendiente');
  const resueltas  = data.filter(r => r.estado !== 'pendiente');

  const renderItem = (r) => {
    const colorEstado = r.estado === 'pendiente' ? '#fbbf24' : (r.estado === 'aprobada' ? '#22c55e' : '#dc2626');
    const labelEstado = r.estado === 'pendiente' ? '⏳ Pendiente' : (r.estado === 'aprobada' ? '✓ Aprobada' : '✗ Rechazada');
    const fechaHora = new Date(r.solicitado_at).toLocaleString('es-AR', { dateStyle:'short', timeStyle:'short' });
    const acciones = (session?.isAdmin && r.estado === 'pendiente')
      ? `<div style="display:flex;gap:6px;margin-top:10px;">

           <button onclick="resolverReaperturaAhora(${r.id}, false)" style="flex:1;background:#dc2626;color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;">✗ Rechazar</button>
         </div>`
      : '';
    const comentario = r.comentario_admin
      ? `<div style="margin-top:6px;padding:6px 10px;background:#f1f5f9;border-radius:4px;font-size:12px;color:#475569;"><b>Admin:</b> ${escHtml(r.comentario_admin)}</div>`
      : '';
    return `
      <div style="border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;">

            <div style="font-weight:700;font-size:14px;">${r.local.toUpperCase()} · ${fmtFecha(r.fecha)}</div>
            <div style="font-size:11px;color:#64748b;">${fechaHora} · ${escHtml(r.solicitado_por)}</div>
          </div>
          <span style="background:${colorEstado};color:#fff;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;">${labelEstado}</span>
        </div>
        <div style="font-size:13px;color:#1e293b;background:#f8fafc;padding:8px 10px;border-radius:4px;border-left:3px solid #c4b5fd;">${escHtml(r.motivo)}</div>

  };

  document.getElementById('reaperturas-body').innerHTML = `
    ${pendientes.length ? `<div style="font-weight:600;color:#92400e;margin-bottom:8px;">⏳ Pendientes (${pendientes.length})</div>${pendientes.map(renderItem).join('')}` : '<div style="color:#64748b;font-size:13px;margin-bottom:10px;">No hay pendientes.</div>'}
    ${resueltas.length ? `<div style="font-weight:600;color:#475569;margin:14px 0 8px;">Historial</div>${resueltas.map(renderItem).join('')}` : ''}`;
}

/** Admin aprueba o rechaza una solicitud. */
async function resolverReaperturaAhora(id, aprobar) {
  const accion = aprobar ? 'aprobar' : 'rechazar';
  const comentario = prompt(`Comentario para la vendedora (opcional):`);
  if (comentario === null) return;  // canceló
  if (!confirm(`¿Confirmás ${accion} la solicitud?${aprobar ? '\n\nEl día se va a reabrir y la próxima sincronización va a actualizar los valores.' : ''}`)) return;
  try {
    const { data, error } = await sb.rpc('resolver_reapertura', {
      p_id: id,
      p_aprobar: aprobar,
      p_comentario: comentario.trim() || null,
    });
    if (error) throw error;
    toast(aprobar ? '✓ Aprobada · día reabierto' : '✗ Rechazada');
    abrirBandejaReaperturas();  // refrescar
    if (typeof verPlanilla === 'function') verPlanilla();
  } catch (e) {
    alert('Error al resolver: ' + e.message);
  }
}

/** Actualiza el badge del botón Reaperturas con contador de pendientes (solo admin). */
async function refrescarBadgeReaperturas() {
  if (!session?.isAdmin) {
    document.getElementById('btn-reaperturas').textContent = '🙏 Reaperturas';
    return;
  }
  try {
    const { count } = await sb.from('ventas_reaperturas')
      .select('id', { count: 'exact', head: true })
      .eq('estado', 'pendiente');
    const btn = document.getElementById('btn-reaperturas');
    if (btn) {
      btn.innerHTML = `🙏 Reaperturas${count > 0 ? ` <span style="background:#dc2626;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;">${count}</span>` : ''}`;
    }
  } catch (e) { /* silent */ }
}

/** Reabre un día previamente cerrado. Solo admin. */
async function reabrirDiaAhora(fecha, localId) {
  if (!session?.isAdmin) {
    toast('Solo admin puede reabrir un día cerrado', true);
    return;
  }
  if (!confirm(`¿Reabrir el día ${fmtFecha(fecha)} en ${localId.toUpperCase()}?\n\nVa a permitir cerrar nuevos turnos en ese día.`)) return;
  try {
    const { error } = await sb.rpc('reabrir_dia', {
      p_local: localId,
      p_fecha: fecha,
      p_por: session?.email || 'admin',
    });
    if (error) throw error;
    toast('🔓 Día reabierto');
    if (typeof verPlanilla === 'function') verPlanilla();
    else location.reload();
  } catch (e) {
    alert('Error al reabrir día: ' + e.message);
  }
}

/** Modal con el detalle del último turno cerrado: valores + discrepancia con MP. */
function mostrarResultadoTurno(turno, fecha, localId) {
  document.getElementById('modal-turno')?.remove();
  const wrap = document.createElement('div');
  wrap.id = 'modal-turno';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  wrap.onclick = (e) => { if (e.target === wrap) wrap.remove(); };

  const t = turno;
  const tieneDisc = t.discrepancia_mp !== null && Math.abs(t.discrepancia_mp) >= 1;
  const colorDisc = tieneDisc ? '#dc2626' : '#16a34a';
  const movs = t.mp_movs_no_match || [];
  const horaDesde = new Date(t.desde).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  const horaHasta = new Date(t.hasta).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});

  wrap.innerHTML = `
    <div style="background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.25);max-width:720px;width:100%;max-height:85vh;overflow:auto;padding:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="margin:0;font-size:18px;">🔒 Turno ${t.numero} · ${localId.toUpperCase()} · ${fmtFecha(fecha)}</h3>
        <button onclick="document.getElementById('modal-turno').remove();" style="background:none;border:none;cursor:pointer;font-size:18px;color:#64748b;padding:0 6px;">✕</button>
      </div>
      <div style="font-size:13px;color:#64748b;margin-bottom:16px;">
        ${horaDesde} → ${horaHasta} · cerrado por ${escHtml(t.cerrado_por || '?')}
      </div>

      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;">
        <div style="background:#f8fafc;padding:12px;border-radius:8px;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;">Efectivo</div>
          <div style="font-size:18px;font-weight:700;">${fmt$(+t.efectivo||0)}</div>
        </div>
        <div style="background:#f8fafc;padding:12px;border-radius:8px;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;">MP Dragonfish</div>
          <div style="font-size:18px;font-weight:700;">${fmt$(+t.qr||0)}</div>
        </div>
        ${(fecha <= FECHA_FIN_TARJETA || +t.tarjeta > 0) ? `
        <div style="background:#f8fafc;padding:12px;border-radius:8px;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;">Tarjeta (Clover)</div>
          <div style="font-size:18px;font-weight:700;">${fmt$(+t.tarjeta||0)}</div>
        </div>
        ` : ''}
        ${(+t.transferencia > 0) ? `
        <div style="background:#f8fafc;padding:12px;border-radius:8px;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;">Transferencia</div>
          <div style="font-size:18px;font-weight:700;">${fmt$(+t.transferencia||0)}</div>
        </div>
        ` : ''}
        ${(+t.cc > 0) ? `
        <div style="background:#f8fafc;padding:12px;border-radius:8px;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;">Cuenta Corriente</div>
          <div style="font-size:18px;font-weight:700;">${fmt$(+t.cc||0)}</div>
        </div>
        ` : ''}
        <div style="background:#f8fafc;padding:12px;border-radius:8px;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;">Vales</div>
          <div style="font-size:18px;font-weight:700;">${fmt$(+t.vales||0)}</div>
        </div>
      </div>

      ${t.mp_cuenta !== null ? `
        <div style="background:${tieneDisc?'#fef2f2':'#f0fdf4'};border-left:4px solid ${colorDisc};border-radius:8px;padding:14px 16px;margin-bottom:16px;">
          <div style="font-size:12px;font-weight:600;color:${colorDisc};text-transform:uppercase;margin-bottom:6px;">
            Cruce con cuenta Mercado Pago
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
            <div>
              <div style="font-size:11px;color:#64748b;">Dragonfish dijo</div>
              <div style="font-size:16px;font-weight:600;">${fmt$(+t.qr||0)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:#64748b;">MP cuenta dijo</div>
              <div style="font-size:16px;font-weight:600;">${fmt$(+t.mp_cuenta||0)}</div>
            </div>
            <div>
              <div style="font-size:11px;color:${colorDisc};">Diferencia</div>
              <div style="font-size:16px;font-weight:700;color:${colorDisc};">${tieneDisc?'⚠ ':''}${fmt$(+t.discrepancia_mp||0)}</div>
            </div>
          </div>
        </div>

        ${(() => {
          // Detalle nuevo: 2 listas lado a lado con verde si tiene_match, rojo si no
          const data = t.mp_movs_no_match || {};
          const movsCuenta = Array.isArray(data) ? data : (data.movs_cuenta || []);
          const txsDf      = Array.isArray(data) ? [] : (data.txs_dragonfish || []);
          const summary    = data.summary || null;
          if (!movsCuenta.length && !txsDf.length) return '';
          const fmtHora = (s) => s ? new Date(s).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '—';
          const renderFila = (m, tieneMatch) => `
            <tr style="border-top:1px solid #f1f5f9;background:${tieneMatch?'#fff':'#fef2f2'};">
              <td style="padding:6px 8px;">${fmtHora(m.hora)}</td>
              <td style="padding:6px 8px;text-align:right;font-weight:600;">${fmt$(+m.importe)}</td>
              <td style="padding:6px 8px;text-align:center;">${tieneMatch ? '<span style="color:#16a34a;">✓</span>' : '<span style="color:#dc2626;font-weight:700;">✗</span>'}</td>
            </tr>`;
          return `
            ${summary ? `
              <div style="display:flex;gap:14px;flex-wrap:wrap;background:#f8fafc;padding:10px 14px;border-radius:6px;margin-bottom:10px;font-size:12px;">
                <div><strong>MP cuenta:</strong> ${summary.cuenta_n} movs ${summary.cuenta_sin_match > 0 ? `<span style="color:#dc2626;">(${summary.cuenta_sin_match} sin match)</span>` : ''}</div>
                <div><strong>Dragonfish:</strong> ${summary.df_n} movs ${summary.df_sin_match > 0 ? `<span style="color:#dc2626;">(${summary.df_sin_match} sin match)</span>` : ''}</div>
              </div>
            ` : ''}
            <details ${tieneDisc?'open':''} style="margin-bottom:8px;">
              <summary style="cursor:pointer;font-weight:600;color:#475569;padding:8px 0;">
                ▶ Comparar transacción por transacción
              </summary>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;">
                <div>
                  <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;margin-bottom:4px;">MP cuenta (${movsCuenta.length})</div>
                  <div style="background:#fff;border:1px solid #e2e8f0;border-radius:6px;max-height:280px;overflow:auto;">
                    <table style="width:100%;font-size:11px;">
                      <thead style="background:#f8fafc;position:sticky;top:0;">
                        <tr>
                          <th style="text-align:left;padding:6px;">Hora</th>
                          <th style="text-align:right;padding:6px;">Importe</th>
                          <th style="text-align:center;padding:6px;">¿Match?</th>
                        </tr>
                      </thead>
                      <tbody>${movsCuenta.map(m => renderFila(m, m.tiene_match)).join('')}</tbody>
                    </table>
                  </div>
                </div>
                <div>
                  <div style="font-size:11px;color:#64748b;text-transform:uppercase;font-weight:600;margin-bottom:4px;">Dragonfish (${txsDf.length})</div>
                  <div style="background:#fff;border:1px solid #e2e8f0;border-radius:6px;max-height:280px;overflow:auto;">
                    <table style="width:100%;font-size:11px;">
                      <thead style="background:#f8fafc;position:sticky;top:0;">
                        <tr>
                          <th style="text-align:left;padding:6px;">Hora</th>
                          <th style="text-align:right;padding:6px;">Importe</th>
                          <th style="text-align:center;padding:6px;">¿Match?</th>
                        </tr>
                      </thead>
                      <tbody>${txsDf.map(m => renderFila(m, m.tiene_match)).join('')}</tbody>
                    </table>
                  </div>
                </div>
              </div>
              <div style="margin-top:8px;font-size:11px;color:#64748b;line-height:1.4;">
                <strong>✗ MP cuenta sin match</strong> = pago entró a MP pero Dragonfish no lo registró (¿venta no cargada en POS?).<br>
                <strong>✗ Dragonfish sin match</strong> = venta marcada en POS pero no llegó (todavía) a MP (¿en proceso? ¿anulada? ¿lag del sync?).
              </div>
            </details>
          `;
        })()}
      ` : '<div style="color:#64748b;font-size:13px;text-align:center;padding:8px;">Cuenta MP no disponible para este local — sin cruce automático.</div>'}

      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
        <button onclick="document.getElementById('modal-turno').remove();" style="background:#7c3aed;color:#fff;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;">OK, listo</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
}

/** Lista los turnos cerrados de un día con sus discrepancias. */
function abrirTurnos(fecha, localId) {
  const turnosDia = window._turnosPorFecha?.[fecha] || [];
  if (!turnosDia.length) { toast('Este día no tiene turnos cerrados'); return; }

  document.getElementById('modal-turno')?.remove();
  const wrap = document.createElement('div');
  wrap.id = 'modal-turno';
  wrap.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  wrap.onclick = (e) => { if (e.target === wrap) wrap.remove(); };

  wrap.innerHTML = `
    <div style="background:#fff;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.25);max-width:780px;width:100%;max-height:85vh;overflow:auto;padding:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <h3 style="margin:0;font-size:18px;">🕐 Turnos · ${localId.toUpperCase()} · ${fmtFecha(fecha)}</h3>
        <button onclick="document.getElementById('modal-turno').remove();" style="background:none;border:none;cursor:pointer;font-size:18px;color:#64748b;padding:0 6px;">✕</button>
      </div>
      ${turnosDia.map(t => {
        const tieneDisc = t.discrepancia_mp !== null && Math.abs(t.discrepancia_mp) >= 1;
        const colorDisc = tieneDisc ? '#dc2626' : '#16a34a';
        const horaDesde = new Date(t.desde).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
        const horaHasta = new Date(t.hasta).toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
        return `
          <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
              <div style="font-weight:700;font-size:15px;">Turno ${t.numero} <span style="font-weight:400;color:#64748b;font-size:12px;">· ${horaDesde} → ${horaHasta}</span></div>
              <div style="font-size:11px;color:#64748b;">por ${escHtml(t.cerrado_por || '?')}</div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(${(fecha <= FECHA_FIN_TARJETA || +t.tarjeta > 0) ? 4 : 3},1fr);gap:8px;font-size:12px;">
              <div><div style="color:#64748b;text-transform:uppercase;font-size:10px;">Efectivo</div><div style="font-weight:600;">${fmt$(+t.efectivo||0)}</div></div>
              ${(fecha <= FECHA_FIN_TARJETA || +t.tarjeta > 0) ? `<div><div style="color:#64748b;text-transform:uppercase;font-size:10px;">Tarjeta</div><div style="font-weight:600;">${fmt$(+t.tarjeta||0)}</div></div>` : ''}
              <div><div style="color:#64748b;text-transform:uppercase;font-size:10px;">MP</div><div style="font-weight:600;">${fmt$(+t.qr||0)}</div></div>
              <div><div style="color:#64748b;text-transform:uppercase;font-size:10px;">Total</div><div style="font-weight:700;">${fmt$(+t.total_turno||0)}</div></div>
            </div>
            ${t.mp_cuenta !== null ? `
              <div style="margin-top:10px;padding:8px 12px;background:${tieneDisc?'#fef2f2':'#f0fdf4'};border-left:3px solid ${colorDisc};border-radius:4px;font-size:12px;">
                Cuenta MP: ${fmt$(+t.mp_cuenta)} · Diferencia: <strong style="color:${colorDisc};">${tieneDisc?'⚠ ':''}${fmt$(+t.discrepancia_mp)}</strong>
                ${tieneDisc ? `<button onclick="event.stopPropagation();mostrarResultadoTurno(${JSON.stringify(t).replace(/"/g,'&quot;')}, '${fecha}', '${localId}')" style="margin-left:8px;background:#dc2626;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;">Ver detalle</button>` : ''}
              </div>
            ` : ''}
          </div>
        `;
      }).join('')}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px;">
        <button onclick="document.getElementById('modal-turno').remove();" style="background:#7c3aed;color:#fff;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;">OK</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
}

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}
