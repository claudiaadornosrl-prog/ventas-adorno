<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ventas · Claudia Adorno</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#dc2626">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --primary: #dc2626;     /* Rojo Ventas */
  --primary-dark: #991b1b;
  --bg: #f9fafb;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --orange: #f59e0b;
  --orange-bg: #fef3c7;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

.screen { display: none; }
.screen.active { display: block; }

/* ═══ LOGIN ═══ */
/* Solo aplica cuando tiene .active — sino prevalece la regla .screen { display:none } */
#login-screen.active { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); }
.login-card { background: white; border-radius: 16px; padding: 30px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 380px; width: 100%; }
.login-card h1 { text-align: center; font-size: 26px; margin: 0 0 4px; color: var(--primary); }
.login-card .sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 22px; }
.login-card label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
.login-card input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; margin-bottom: 14px; }
.login-card input:focus { outline: none; border-color: var(--primary); }
.local-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.local-opt { border: 2px solid var(--border); border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.15s; background: white; }
.local-opt:hover { border-color: #aaa; }
.local-opt.selected { border-color: var(--primary); background: var(--primary); color: white; }
.local-opt .icon { font-size: 22px; margin-bottom: 4px; }
.local-opt .name { font-size: 12px; font-weight: 700; }
.btn-primary { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { color: var(--primary); font-size: 12px; margin-bottom: 8px; min-height: 16px; }
.admin-link { text-align: center; margin-top: 14px; font-size: 12px; }
.admin-link a { color: var(--muted); text-decoration: underline; cursor: pointer; }

/* ═══ APP ═══ */
.header { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-title { font-size: 17px; font-weight: 700; color: var(--primary); }
.header-local { font-size: 12px; color: var(--muted); }
.header-right { display: flex; gap: 8px; align-items: center; }
.btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.btn-secondary:hover { background: #f3f4f6; }
.btn-icon { background: white; border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; }

.toolbar { background: white; border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.toolbar select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: white; cursor: pointer; }
.toolbar button { padding: 7px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; background: white; }
.toolbar button.primary { background: var(--primary); color: white; border-color: var(--primary); }
.toolbar button.primary:hover { background: var(--primary-dark); }
.toolbar .spacer { flex: 1; }

/* KPIs */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 16px; }
.kpi { background: white; border-radius: 10px; padding: 14px; box-shadow: var(--shadow); }
.kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.kpi-value { font-size: 22px; font-weight: 700; margin-top: 4px; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Tabla */
.table-wrap { background: white; margin: 0 16px 16px; border-radius: 10px; box-shadow: var(--shadow); overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
th { background: #f9fafb; padding: 10px 8px; text-align: right; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); position: sticky; top: 0; }
th:first-child { text-align: left; }
td { padding: 8px; border-bottom: 1px solid #f3f4f6; text-align: right; font-variant-numeric: tabular-nums; }
td:first-child { text-align: left; font-weight: 600; }
/* Zebra striping — filas alternadas como Excel */
tbody tr:nth-child(even) { background: #f8fafc; }
tbody tr:nth-child(odd)  { background: #ffffff; }
tbody tr:hover { background: #fef3c7; }
td.editable { cursor: pointer; }
td.editable:hover { background: #fef3c7; }
td input { width: 100%; padding: 4px; border: 1px solid var(--primary); border-radius: 4px; text-align: right; font: inherit; font-variant-numeric: tabular-nums; }
.row-total { background: #fef3c7; font-weight: 700; }
.row-empty td { color: #cbd5e1; }
.row-today { background: #ecfeff; }
.row-controlado { background: #f0fdf4; }
.row-controlado td:first-child::before { content: '✓ '; color: var(--green); }
.cell-derived { background: #f9fafb; color: var(--muted); }
.cell-derived.big { background: #eef2ff; color: #4338ca; font-weight: 700; }

/* Vista admin */
.admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
@media (max-width: 800px) {
  .admin-grid { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
}

.empty { padding: 60px 20px; text-align: center; color: var(--muted); }
.empty .icon { font-size: 42px; margin-bottom: 10px; }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111827; color: white; padding: 10px 18px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 999; pointer-events: none; }
#toast.show { opacity: 1; }
#toast.err { background: var(--primary); }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.chip-controlado { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.chip-controlado.si { background: var(--green-bg); color: #065f46; }
.chip-controlado.no { background: var(--orange-bg); color: #92400e; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <h1>📊 Ventas</h1>
    <p class="sub">Claudia Adorno · Carga de ventas diarias</p>
    <label>Local</label>
    <div class="local-grid">
      <div class="local-opt" data-local="alcorta" onclick="selectLocal(this)">
        <div class="icon">🛍️</div><div class="name">Alcorta</div>
      </div>
      <div class="local-opt" data-local="unicenter" onclick="selectLocal(this)">
        <div class="icon">🏬</div><div class="name">Unicenter</div>
      </div>
      <div class="local-opt" data-local="oficina" onclick="selectLocal(this)">
        <div class="icon">💻</div><div class="name">Oficina</div>
      </div>
    </div>
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="Contraseña del local" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-error"></div>
    <button class="btn-primary" id="login-btn" disabled onclick="doLogin()">Entrar →</button>
    <div class="admin-link"><a onclick="loginAdmin()">Entrar como administrador (JP)</a></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="header">
    <div class="header-left">
      <span class="header-title">📊 Ventas</span>
      <span class="header-local" id="hdr-local"></span>
    </div>
    <div class="header-right">
      <button class="btn-icon" id="refresh-btn" onclick="cargar()" title="Actualizar">↻</button>
      <button class="btn-secondary" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="toolbar">
    <select id="sel-año" onchange="cargar()"></select>
    <select id="sel-mes" onchange="cargar()"></select>
    <select id="sel-local" onchange="cargar()" style="display:none;"></select>
    <div class="spacer"></div>
    <button id="btn-dragonfish" onclick="abrirCargaDragonfish('3d')" title="Trae desde Dragonfish los últimos 3 días (hoy, ayer y antesdeayer) — rápido, ideal para uso diario">🐉 Actualizar (últimos 3 días)</button>
    <button id="btn-dragonfish-mes" onclick="abrirCargaDragonfish('mes')" style="display:none;" title="Re-sincroniza TODO el mes seleccionado desde Dragonfish (admin) — más lento, ideal antes de cerrar o ante una corrección retroactiva">🐉 Resincronizar mes</button>
    <button class="primary" id="btn-cargar-dia" onclick="abrirCarga()">+ Cargar venta del día</button>
    <button id="btn-cerrar-mes" onclick="cerrarMesActual()" style="display:none;background:#fef3c7;color:#92400e;border-color:#fcd34d;">🔒 Cerrar mes</button>
    <button id="btn-reabrir-mes" onclick="reabrirMesActual()" style="display:none;background:#fee2e2;color:#991b1b;border-color:#fca5a5;">🔓 Reabrir mes</button>
  </div>
  <div id="status-mes" style="background:white;padding:6px 16px;border-bottom:1px solid var(--border);font-size:12px;display:none;"></div>

  <div id="contenido"><div class="empty"><div class="spinner"></div></div></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════
const SUPA_URL = 'https://kwwiykssrpabncpqtmwi.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3d2l5a3NzcnBhYm5jcHF0bXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNjI1NTQsImV4cCI6MjA5NDkzODU1NH0.O1VhKdjPahnJJ9qXcQuSKQbnKGhsEZqYmjDEfRuRpkc';
const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storageKey: 'ventas-adorno-auth' }
});

const LOCAL_EMAILS = {
  alcorta:   'alcorta@claudiaadorno.com',
  unicenter: 'unicenter@claudiaadorno.com',
  oficina:   'administracion@claudiaadorno.com',
};
const ADMIN_EMAIL = 'juanpsimonelli@gmail.com';
const LOCALES = {
  alcorta:   { nombre: 'Alcorta',   icon: '🛍️' },
  unicenter: { nombre: 'Unicenter', icon: '🏬' },
  oficina:   { nombre: 'Oficina',   icon: '💻' },
};

let session = null;  // { email, local_id|null, isAdmin }

// ═══════════════════════════════════════════════════════════════════════
// URL FILTER — cada local tiene su shortcut: ?local=alcorta|unicenter|oficina
// Si está presente, la PWA se "ata" a ese local: oculta los demás botones,
// no permite entrar como admin, y si la sesión persistida corresponde a otro
// local, se cierra sesión automáticamente.
// ═══════════════════════════════════════════════════════════════════════
const URL_LOCAL = (() => {
  const p = new URLSearchParams(location.search).get('local');
  return p && LOCALES[p] ? p : null;
})();

const fmt$ = n => (n || 0).toLocaleString('es-AR', { maximumFractionDigits: 0 });
const fmtFecha = d => new Date(d + 'T12:00:00').toLocaleDateString('es-AR', { day: '2-digit', month: 'short' });
const hoyISO = () => new Date().toISOString().split('T')[0];
const escHtml = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (err ? ' err' : '');
  setTimeout(() => { t.className = ''; }, 2800);
}

// ═══════════════════════════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════════════════════════
function selectLocal(el) {
  document.querySelectorAll('.local-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  checkLoginReady();
}
function checkLoginReady() {
  const sel = document.querySelector('.local-opt.selected');
  const pass = document.getElementById('login-pass').value.trim();
  document.getElementById('login-btn').disabled = !(sel && pass);
}
document.getElementById('login-pass').addEventListener('input', checkLoginReady);

// Si la URL trae ?local=, pre-fijar ese local y ocultar los demás + el link admin
(function aplicarURLLocal(){
  if (!URL_LOCAL) return;
  document.querySelectorAll('.local-opt').forEach(el => {
    if (el.dataset.local === URL_LOCAL) {
      el.classList.add('selected');
      el.style.cursor = 'default';
      el.onclick = null;
    } else {
      el.style.display = 'none';
    }
  });
  // Esconder link "entrar como admin" — esta URL es para vendedoras del local
  const adminLink = document.querySelector('.admin-link');
  if (adminLink) adminLink.style.display = 'none';
  // Mostrar nombre del local en el título
  const subEl = document.querySelector('.login-card .sub');
  if (subEl) subEl.textContent = LOCALES[URL_LOCAL].icon + ' ' + LOCALES[URL_LOCAL].nombre + ' · ingresá la contraseña';
  checkLoginReady();
})();

async function doLogin() {
  const localEl = document.querySelector('.local-opt.selected');
  const pass = document.getElementById('login-pass').value.trim();
  if (!localEl || !pass) return;
  const local = localEl.dataset.local;
  // Si la URL fija un local, no permitir loguearse a otro (defensa extra)
  if (URL_LOCAL && local !== URL_LOCAL) {
    document.getElementById('login-error').textContent = 'Esta URL es exclusiva de ' + LOCALES[URL_LOCAL].nombre;
    return;
  }
  const email = LOCAL_EMAILS[local];
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  document.getElementById('login-btn').disabled = true;
  try {
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    session = { email, local_id: local, isAdmin: false };
    enterApp();
  } catch (e) {
    errEl.textContent = e.message || 'No se pudo entrar';
    document.getElementById('login-btn').disabled = false;
  }
}

async function loginAdmin() {
  if (URL_LOCAL) { alert('Esta URL es del local ' + LOCALES[URL_LOCAL].nombre + '. Para entrar como admin, abrí la URL sin parámetro.'); return; }
  const pass = prompt('Contraseña de administrador:');
  if (!pass) return;
  try {
    const { error } = await sb.auth.signInWithPassword({ email: ADMIN_EMAIL, password: pass.trim() });
    if (error) throw error;
    session = { email: ADMIN_EMAIL, local_id: null, isAdmin: true };
    enterApp();
  } catch (e) {
    alert('No se pudo entrar como admin: ' + (e.message || 'error'));
  }
}

async function logout() {
  await sb.auth.signOut();
  session = null;
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
}

// ═══════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════
function enterApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');

  // Header
  if (session.isAdmin) {
    document.getElementById('hdr-local').textContent = '· Admin (JP)';
  } else {
    document.getElementById('hdr-local').textContent = '· ' + (LOCALES[session.local_id]?.nombre || session.local_id);
  }

  // Selectores
  const selAño = document.getElementById('sel-año');
  const selMes = document.getElementById('sel-mes');
  const selLocal = document.getElementById('sel-local');
  const añoActual = new Date().getFullYear();
  selAño.innerHTML = [añoActual-1, añoActual, añoActual+1].map(a => `<option value="${a}"${a===añoActual?' selected':''}>${a}</option>`).join('');
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  selMes.innerHTML = meses.map((m, i) => `<option value="${i+1}"${(i+1)===(new Date().getMonth()+1)?' selected':''}>${m}</option>`).join('');
  // Selector de local solo para admin
  if (session.isAdmin) {
    selLocal.style.display = '';
    selLocal.innerHTML = '<option value="todos">Todos (consolidado)</option>' +
      Object.entries(LOCALES).map(([id, l]) => `<option value="${id}">${l.icon} ${l.nombre}</option>`).join('');
  }

  cargar();
}

async function cargar() {
  const año = parseInt(document.getElementById('sel-año').value);
  const mes = parseInt(document.getElementById('sel-mes').value);
  const localSel = session.isAdmin ? document.getElementById('sel-local').value : session.local_id;
  document.getElementById('refresh-btn').innerHTML = '<span class="spinner"></span>';

  // Chequear si el mes está cerrado para este local (sólo si hay local específico)
  const localUnico = localSel && localSel !== 'todos' ? localSel : null;
  let cerrado = null;
  if (localUnico) {
    try {
      const r = await sb.from('meses_cerrados_ventas')
        .select('id, cerrado_por, cerrado_at')
        .eq('local', localUnico).eq('año', año).eq('mes', mes).maybeSingle();
      cerrado = r.data;
    } catch(_) {}
  }
  _actualizarBotonesCierre(cerrado, localUnico);

  try {
    const desde = `${año}-${String(mes).padStart(2,'0')}-01`;
    const hastaDate = new Date(año, mes, 0);
    const hasta = hastaDate.toISOString().split('T')[0];

    let q = sb.from('ventas_diarias_view')
      .select('*')
      .gte('fecha', desde).lte('fecha', hasta)
      .order('fecha');
    if (localSel && localSel !== 'todos') q = q.eq('local', localSel);
    const { data, error } = await q;
    if (error) throw error;

    if (session.isAdmin && localSel === 'todos') {
      renderAdminConsolidado(data || [], año, mes);
    } else {
      renderGrillaLocal(data || [], año, mes, localSel);
    }
  } catch (e) {
    document.getElementById('contenido').innerHTML = `<div class="empty"><div class="icon">⚠️</div>Error: ${escHtml(e.message)}</div>`;
  } finally {
    document.getElementById('refresh-btn').innerHTML = '↻';
  }
}

// ─── Grilla mensual de un local ──────────────────────────────────────
function renderGrillaLocal(ventas, año, mes, localId) {
  const cont = document.getElementById('contenido');
  const diasMes = new Date(año, mes, 0).getDate();
  const hoy = hoyISO();
  const porFecha = {};
  ventas.forEach(v => { porFecha[v.fecha] = v; });

  // KPIs del mes
  let totShopping = 0, totTotal = 0, totEfectivo = 0, totTarjeta = 0, totQR = 0, totVales = 0, totOnline = 0, totFcOf = 0, totCant = 0;
  ventas.forEach(v => {
    totShopping += +v.shopping || 0;
    totTotal    += +v.total    || 0;
    totEfectivo += +v.efectivo || 0;
    totTarjeta  += +v.tarjeta  || 0;
    totQR       += +v.qr       || 0;
    totVales    += +v.vales    || 0;
    totOnline   += +v.online   || 0;
    totFcOf     += +v.fc_oficina || 0;
    totCant     += +v.cant_transacciones || 0;
  });
  const ticketProm = totCant > 0 ? Math.round(totShopping / totCant) : 0;
  const diasConVenta = ventas.filter(v => (v.shopping||0) > 0).length;
  const promDiario = diasConVenta > 0 ? Math.round(totTotal / diasConVenta) : 0;

  // Render
  let acum = 0;
  const filas = [];
  for (let d = 1; d <= diasMes; d++) {
    const fecha = `${año}-${String(mes).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const v = porFecha[fecha];
    const shopping = v ? +v.shopping || 0 : 0;
    const total = v ? +v.total || 0 : 0;
    acum += total;
    const esHoy = fecha === hoy;
    const klass = [
      !v ? 'row-empty' : '',
      esHoy ? 'row-today' : '',
      v?.controlado ? 'row-controlado' : '',
    ].filter(Boolean).join(' ');
    filas.push(`
      <tr class="${klass}" onclick="abrirEditar('${fecha}','${localId}',${JSON.stringify(v||null).replace(/"/g, '&quot;')})" style="cursor:pointer;">
        <td>${fmtFecha(fecha)}</td>
        <td>${v ? fmt$(v.efectivo) : '—'}</td>
        <td>${v ? fmt$(v.tarjeta) : '—'}</td>
        <td>${v ? fmt$(v.qr) : '—'}</td>
        <td>${v ? fmt$(v.vales) : '—'}</td>
        <td class="cell-derived">${v ? fmt$(shopping) : '—'}</td>
        <td>${v ? (v.cant_transacciones || '—') : '—'}</td>
        <td>${v ? fmt$(v.online) : '—'}</td>
        <td>${v ? fmt$(v.fc_oficina) : '—'}</td>
        <td class="cell-derived big">${v ? fmt$(total) : '—'}</td>
        <td class="cell-derived">${fmt$(acum)}</td>
      </tr>

  const locales = ['alcorta', 'unicenter', 'oficina'];

    </div>

      <table>

            <th colspan="2" style="text-align:center;">🛍️ Alcorta</th>
            <th colspan="2" style="text-align:center;">🏬 Unicenter</th>
            <th colspan="2" style="text-align:center;">💻 Oficina</th>
            <th rowspan="2" style="vertical-align:bottom;">Total día</th>
          </tr>
          <tr>
            <th>Diaria</th><th>Acumulado</th>
            <th>Diaria</th><th>Acumulado</th>
            <th>Diaria</th><th>Acumulado</th>
          </tr>
        </thead>
        <tbody>${filas.join('')}</tbody>
        <tfoot>
          <tr class="row-total">
            <td>TOTAL</td>
            <td>${fmt$(totLocales.alcorta)}</td><td>—</td>

// ─── Guardar venta diaria (insert o update) ──────────────────────────
async function guardarVenta(fecha, localId, vId) {
  const btn = document.getElementById('btn-guardar');
  const errEl = document.getElementById('form-error');
  const num = id => {
    const v = document.getElementById(id).value;
    return v === '' ? 0 : parseFloat(v);
  };
  const intNum = id => {
    const v = document.getElementById(id).value;
    return v === '' ? 0 : parseInt(v);
  };
  const data = {
    local: localId,
    fecha: fecha,
    efectivo: num('f-efectivo'),
    tarjeta: num('f-tarjeta'),
    qr: num('f-qr'),
    vales: num('f-vales'),
    online: num('f-online'),
    fc_oficina: num('f-fc-of'),
    cant_transacciones: intNum('f-cant'),
    controlado: document.getElementById('f-controlado').checked,
    cargado_por: session.email,
    origen: 'manual',
  };
  if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…'; }
  try {
    let res;
    if (vId) {
      res = await sb.from('ventas_diarias').update(data).eq('id', vId);
    } else {
      // Upsert por (local, fecha) para no romper si ya existe
      res = await sb.from('ventas_diarias').upsert(data, { onConflict: 'local,fecha' });
    }
    if (res.error) throw res.error;
    cerrarModal();
    toast('✓ Guardado');
    cargar();
  } catch (e) {
    if (errEl) { errEl.textContent = e.message || 'Error al guardar'; errEl.style.display = 'block'; }
    if (btn) { btn.disabled = false; btn.textContent = 'Guardar'; }
  }
}

// ─── Cargar desde Dragonfish: inserta job + polling ──────────────────
// modo: '3d' (últimos 3 días, rápido) o 'mes' (mes completo, admin)
async function abrirCargaDragonfish(modo) {
  modo = modo || '3d';
  const localId = session.isAdmin ? document.getElementById('sel-local').value : session.local_id;
  if (session.isAdmin && (!localId || localId === 'todos')) {
    toast('Elegí un local específico antes', true);
    return;
  }
  const año = parseInt(document.getElementById('sel-año').value);
  const mes = parseInt(document.getElementById('sel-mes').value);

  // Calcular rango según modo
  let desde, hasta, label;
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  if (modo === 'mes') {
    desde = `${año}-${String(mes).padStart(2,'0')}-01`;
    const ultDia = new Date(año, mes, 0).getDate();
    hasta = `${año}-${String(mes).padStart(2,'0')}-${String(ultDia).padStart(2,'0')}`;
    label = `${meses[mes-1]} ${año}`;
    if (!confirm(`Resincronizar TODO ${label} de ${LOCALES[localId].nombre} desde Dragonfish.\n\nVa a sobreescribir cualquier dato manual del mes con los valores actuales del Dragonfish.\n\n¿Confirmás?`)) return;
  } else {
    // '3d' = últimos 3 días (hoy, ayer, antesdeayer)
    const hoy = new Date();
    const ant = new Date(hoy); ant.setDate(hoy.getDate() - 2);
    const toISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    desde = toISO(ant);
    hasta = toISO(hoy);
    label = 'últimos 3 días';
  }

  // Verificar si el mes del rango está cerrado
  const fechaCheck = new Date(desde + 'T12:00:00');
  const { data: cerrado } = await sb.from('meses_cerrados_ventas')
    .select('id').eq('local', localId)
    .eq('año', fechaCheck.getFullYear()).eq('mes', fechaCheck.getMonth()+1)
    .maybeSingle();
  if (cerrado) {
    toast(`🔒 El mes ${desde.slice(0,7)} está cerrado. Reabrir primero para sincronizar.`, true);
    return;
  }

  toast(`🐉 Pidiendo al servicio local (${label})…`);
  try {
    const { data: job, error } = await sb.from('dragonfish_jobs').insert({
      local: localId, fecha: desde,
      tipo: 'mes', fecha_desde: desde, fecha_hasta: hasta,
      estado: 'pendiente',
      solicitado_por: session.email,
    }).select().single();
    if (error) throw error;
    pollJob(job.id, localId, label);
  } catch (e) {
    toast('Error: ' + e.message, true);
  }
}

async function pollJob(jobId, localId, label) {
  const MAX_INTENTOS = 200;  // 200 × 3s = 10 min máximo (mes completo)
  let intentos = 0;
  const tickear = async () => {
    intentos++;
    try {
      const { data: j } = await sb.from('dragonfish_jobs').select('*').eq('id', jobId).single();
      if (!j) return;
      if (j.estado === 'completado') {
        const p = j.payload || {};
        const n = p.dias_procesados || 0;
        toast(`✓ ${LOCALES[localId]?.nombre} ${label}: ${n} día(s) sincronizado(s)`);
        cargar();
        return;
      }
      if (j.estado === 'error') {
        toast(`✗ Error sync: ${j.error_msg || 'desconocido'}`, true);
        return;
      }
      if (intentos >= MAX_INTENTOS) {
        toast(`⏳ Tomando demasiado. Job #${jobId} sigue procesando.`, true);
        return;
      }
      setTimeout(tickear, 3000);
    } catch (e) {
      console.warn('poll error', e);
      setTimeout(tickear, 5000);
    }
  };
  tickear();
}

// ─── Estado de cierre: mostrar/ocultar botones + status bar ─────────
function _actualizarBotonesCierre(cerradoRow, localUnico) {
  const statusEl = document.getElementById('status-mes');
  const btnCerrar = document.getElementById('btn-cerrar-mes');
  const btnReabrir = document.getElementById('btn-reabrir-mes');
  const btnDF = document.getElementById('btn-dragonfish');
  const btnDFmes = document.getElementById('btn-dragonfish-mes');
  const btnDia = document.getElementById('btn-cargar-dia');

  // Reset
  btnCerrar.style.display = 'none';
  btnReabrir.style.display = 'none';
  if (btnDFmes) btnDFmes.style.display = 'none';
  statusEl.style.display = 'none';
  if (btnDF) btnDF.disabled = false;
  if (btnDia) btnDia.disabled = false;

  if (!localUnico) return;  // En vista "Todos" no aplican botones de cierre

  if (cerradoRow) {
    // Mes cerrado: mostrar chip + botón Reabrir + bloquear edición
    const cuando = (cerradoRow.cerrado_at || '').split('T')[0];
    const por = (cerradoRow.cerrado_por || '').split('@')[0];
    statusEl.style.display = '';
    statusEl.innerHTML = `<span style="background:#dcfce7;color:#065f46;padding:3px 9px;border-radius:10px;font-weight:600;">🔒 Mes cerrado</span> · por ${escHtml(por)} (${cuando}) · para modificar, reabrir primero`;
    if (session.isAdmin) btnReabrir.style.display = '';
    if (btnDF) btnDF.disabled = true;
    if (btnDia) btnDia.disabled = true;
  } else {
    // Mes abierto: mostrar botón Cerrar (solo admin) + botón Resincronizar mes (admin)
    statusEl.style.display = '';
    statusEl.innerHTML = `<span style="background:#fef3c7;color:#92400e;padding:3px 9px;border-radius:10px;font-weight:600;">🔓 Mes abierto</span> · podés editar y sincronizar`;
    if (session.isAdmin) {
      btnCerrar.style.display = '';
      if (btnDFmes) btnDFmes.style.display = '';
    }
  }
}

// ─── Cierre / Reapertura de mes (solo admin) ────────────────────────
async function cerrarMesActual() {
  const año = parseInt(document.getElementById('sel-año').value);
  const mes = parseInt(document.getElementById('sel-mes').value);
  const localId = session.isAdmin ? document.getElementById('sel-local').value : session.local_id;
  if (!localId || localId === 'todos') { toast('Elegí un local específico', true); return; }
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const label = `${meses[mes-1]} ${año}`;
  if (!confirm(`¿Cerrar ${label} de ${LOCALES[localId].nombre}?\n\nAntes de cerrar, voy a hacer una sincronización completa desde Dragonfish para asegurar que todos los días del mes están al día.\n\nDespués del cierre, nadie podrá modificar las ventas ni resincronizar hasta reabrir.\n\n¿Confirmás?`)) return;

  // 1) Sync completo del mes antes de cerrar (garantiza datos finales correctos)
  try {
    const desde = `${año}-${String(mes).padStart(2,'0')}-01`;
    const ultDia = new Date(año, mes, 0).getDate();
    const hasta = `${año}-${String(mes).padStart(2,'0')}-${String(ultDia).padStart(2,'0')}`;
    toast(`🐉 Sincronización previa al cierre…`);
    const { data: job, error: errJob } = await sb.from('dragonfish_jobs').insert({
      local: localId, fecha: desde,
      tipo: 'mes', fecha_desde: desde, fecha_hasta: hasta,
      estado: 'pendiente',
      solicitado_por: session.email,
    }).select().single();
    if (errJob) throw errJob;
    // Esperar a que termine antes de cerrar
    const ok = await esperarJob(job.id, 180);  // hasta 3 minutos
    if (!ok) {
      toast(`⚠ Sync no completó. Cerrá el mes manualmente si querés.`, true);
      return;
    }
  } catch (e) {
    if (!confirm(`No se pudo sincronizar Dragonfish: ${e.message}\n\n¿Cerrar el mes igualmente?`)) return;
  }

  // 2) Cerrar el mes
  try {
    const { error } = await sb.rpc('ventas_cerrar_mes', { p_local: localId, p_año: año, p_mes: mes });
    if (error) throw error;
    toast(`🔒 ${label} cerrado`);
    cargar();
  } catch (e) { toast('Error: ' + e.message, true); }
}

// Espera hasta que el job termine. Devuelve true si completó OK, false si falló o timeout.
async function esperarJob(jobId, timeoutSec) {
  const t0 = Date.now();
  while ((Date.now() - t0) < timeoutSec * 1000) {
    const { data: j } = await sb.from('dragonfish_jobs').select('estado, error_msg').eq('id', jobId).single();
    if (j?.estado === 'completado') return true;
    if (j?.estado === 'error') { toast(`✗ Sync error: ${j.error_msg||'desconocido'}`, true); return false; }
    await new Promise(r => setTimeout(r, 2000));
  }
  return false;
}

async function reabrirMesActual() {
  const año = parseInt(document.getElementById('sel-año').value);
  const mes = parseInt(document.getElementById('sel-mes').value);
  const localId = session.isAdmin ? document.getElementById('sel-local').value : session.local_id;
  if (!localId || localId === 'todos') return;
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  if (!confirm(`¿Reabrir ${meses[mes-1]} ${año} de ${LOCALES[localId].nombre}?`)) return;
  try {
    const { error } = await sb.rpc('ventas_reabrir_mes', { p_local: localId, p_año: año, p_mes: mes });
    if (error) throw error;
    toast(`🔓 ${meses[mes-1]} ${año} reabierto`);
    cargar();
  } catch (e) { toast('Error: ' + e.message, true); }
}

// INIT — restaurar sesión si existe
// ═══════════════════════════════════════════════════════════════════════
(async function init() {
  const { data: { session: authSession } } = await sb.auth.getSession();
  if (authSession?.user) {
    const email = authSession.user.email;
    const isAdmin = email === ADMIN_EMAIL;
    let local_id = null;
    if (!isAdmin) {
      for (const [id, em] of Object.entries(LOCAL_EMAILS)) {
        if (em === email) { local_id = id; break; }
      }
    }
    // Si la URL fija un local y la sesión persistida es de otro (o de admin),
    // cerrar sesión y forzar login del local correcto.
    if (URL_LOCAL && (isAdmin || local_id !== URL_LOCAL)) {
      await sb.auth.signOut();
      return;
    }
    session = { email, local_id, isAdmin };
    enterApp();
  }
})();
